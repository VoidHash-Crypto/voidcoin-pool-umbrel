<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Block History - Void Pool</title>
    <style>
        :root {
            --bg: #050210;
            --card: rgba(12,6,24,0.96);
            --border: rgba(155,108,247,0.2);
            --text: #fff;
            --text-dim: #888;
            --green: #9b6cf7;
            --green-dark: #7a4fd6;
            --red: #ff4757;
            --yellow: #f1c40f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: #050210;
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #000;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .back-link {
            margin-left: auto;
            color: var(--green);
            text-decoration: none;
            font-size: 14px;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .stat-value { font-size: 20px; font-weight: 600; color: var(--green); }
        .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .section-header {
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-row {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .block-row:last-child { border-bottom: none; }
        .block-height {
            background: var(--green);
            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            margin-right: 12px;
            min-width: 70px;
            text-align: center;
        }
        .block-height.pending {
            background: var(--yellow);
        }
        .block-height.orphan {
            background: var(--red);
        }
        .block-info { flex: 1; }
        .block-time { font-size: 12px; color: var(--text-dim); }
        .block-hash { font-size: 10px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; }
        .block-reward { font-size: 14px; font-weight: 600; color: var(--green); font-family: 'JetBrains Mono', monospace; }
        .block-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .block-type.solo { background: rgba(241, 196, 15, 0.2); color: var(--yellow); }
        .block-type.pplns { background: rgba(10, 193, 142, 0.2); color: var(--green); }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .page-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .page-btn:hover { border-color: var(--green); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .page-btn.active { background: var(--green); color: #000; border-color: var(--green); }

        .empty { padding: 32px; text-align: center; color: var(--text-dim); font-size: 13px; }

        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 8px 16px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
        }
        .nav-item.active { color: var(--green); }
        .nav-item svg { display: block; margin: 0 auto 4px; width: 24px; height: 24px; }

        @media (min-width: 600px) {
            body { max-width: 600px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">F</div>
        <h1>Block History</h1>
        <a href="/" class="back-link">Back</a>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-value" id="totalBlocks">--</div>
            <div class="stat-label">Total Blocks</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="totalReward">--</div>
            <div class="stat-label">Total Reward</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">All Mined Blocks</div>
        <div id="blocksList">
            <div class="empty">Loading blocks...</div>
        </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <nav class="nav">
        <a href="/" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            Home
        </a>
        <a href="/settings" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            Settings
        </a>
        <a href="/blocks" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Blocks
        </a>
    </nav>

    <script>
        const API = '/api/v1';
        let currentPage = 1;
        const limit = 20;

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return seconds + 's ago';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            return Math.floor(seconds / 86400) + 'd ago';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function fetchBlocks(page) {
            try {
                const res = await fetch(`${API}/blocks?page=${page}&limit=${limit}`);
                const data = await res.json();

                const blocks = data.blocks || [];
                const total = data.total || 0;

                document.getElementById('totalBlocks').textContent = total;

                // Calculate total reward
                let totalReward = 0;
                blocks.forEach(b => totalReward += (b.reward || 50));
                document.getElementById('totalReward').textContent = totalReward.toFixed(2) + ' VOID';

                renderBlocks(blocks);
                renderPagination(total, page);
            } catch (e) {
                console.error('Failed to fetch blocks:', e);
                document.getElementById('blocksList').innerHTML = '<div class="empty">Failed to load blocks</div>';
            }
        }

        function renderBlocks(blocks) {
            const list = document.getElementById('blocksList');

            if (!blocks || blocks.length === 0) {
                list.innerHTML = '<div class="empty">No blocks found yet. Keep mining!</div>';
                return;
            }

            list.innerHTML = blocks.map(b => {
                const blockTime = b.time ? new Date(b.time * 1000) : new Date();
                const heightClass = b.status === 'pending' ? 'pending' : (b.status === 'orphan' ? 'orphan' : '');
                const typeClass = b.type === 'SOLO' ? 'solo' : 'pplns';
                const hash = b.hash || '';
                const shortHash = hash.length > 16 ? hash.substring(0, 8) + '...' + hash.substring(hash.length - 8) : hash;

                return `
                <div class="block-row">
                    <div class="block-height ${heightClass}">${escapeHtml(String(b.height))}</div>
                    <div class="block-info">
                        <div class="block-time">${escapeHtml(timeAgo(blockTime))}
                            <span class="block-type ${typeClass}">${escapeHtml(b.type || 'PPLNS')}</span>
                        </div>
                        <div class="block-hash">${escapeHtml(shortHash)}</div>
                    </div>
                    <div class="block-reward">${escapeHtml((b.reward || 50).toFixed(2))} VOID</div>
                </div>
            `}).join('');
        }

        function renderPagination(total, page) {
            const pages = Math.ceil(total / limit);
            const pagination = document.getElementById('pagination');

            if (pages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button class="page-btn" onclick="goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''}>Prev</button>`;
            html += `<button class="page-btn active">${page} / ${pages}</button>`;
            html += `<button class="page-btn" onclick="goToPage(${page + 1})" ${page >= pages ? 'disabled' : ''}>Next</button>`;

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            fetchBlocks(page);
        }

        // Initial load
        fetchBlocks(1);
    </script>
</body>
</html>
